<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardinage Lunaire</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌙 Jardinage Lunaire</h1>
            <p>Calculs astronomiques précis mis à jour quotidiennement</p>
        </div>

        <div id="saints-banner" class="saints-banner" style="display: none;"></div>

        <div class="data-info">
            <span>🕐 Dernière mise à jour : </span>
            <span id="lastUpdate">Chargement...</span>
        </div>

        <div class="controls">

            <div class="city-selector">
                <h3>🏙️ Sélectionnez votre ville :</h3>
                <div class="cities-grid">
                    <button class="city-btn" data-city="paris">Paris</button>
                    <button class="city-btn active" data-city="lyon">Lyon</button>
                    <button class="city-btn" data-city="marseille">Marseille</button>
                    <button class="city-btn" data-city="toulouse">Toulouse</button>
                    <button class="city-btn" data-city="lille">Lille</button>
                    <button class="city-btn" data-city="nantes">Nantes</button>
                    <button class="city-btn" data-city="strasbourg">Strasbourg</button>
                    <button class="city-btn" data-city="montpellier">Montpellier</button>
                    <button class="city-btn" data-city="bordeaux">Bordeaux</button>
                    <button class="city-btn" data-city="nice">Nice</button>
                </div>
            </div>
            
            <div class="control-group">
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="detailed">
                        <label for="detailed">Affichage détaillé</label>
                    </div>
                </div>
            </div>

        </div>

        <div class="loading" id="loading">
            <p>🌙 Chargement des données lunaires...</p>
        </div>

        <div class="results" id="results"></div>
        
        <footer class="footer">
            <p>&copy; 2025 davidtre07 - Tous droits réservés</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
